<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Sillage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #141110; --bg-surface: #1C1815; --burgundy: #8B2C4A;
      --gold: #D4AF6A; --text-1: #EDE7DC; --text-2: #8A7E74;
      --border: #221C18; --font-d: 'Cormorant Garamond', Georgia, serif;
      --font-b: 'Inter', system-ui, sans-serif; --max-w: 720px;
    }
    body { background: var(--bg); color: var(--text-1); font-family: var(--font-b); line-height: 1.7; }
    header { padding: 24px 24px; border-bottom: 1px solid var(--border); }
    header a { color: var(--gold); font-family: var(--font-d); font-size: 1.4rem; letter-spacing: 0.05em; }
    main { max-width: var(--max-w); margin: 0 auto; padding: 48px 24px 96px; text-align: center; }
    h1 { font-family: var(--font-d); font-size: 2.4rem; font-weight: 400; color: var(--text-1); margin-bottom: 24px; }
    p { color: var(--text-2); margin-bottom: 16px; font-size: 0.95rem; }
    a { color: var(--burgundy); }
    .email { display: inline-block; margin-top: 16px; font-size: 1.1rem; color: var(--gold); }
  </style>
</head>
<body>
  <header><a href="/">Sillage</a></header>
  <main>
    <h1>Get in touch</h1>
    <p>For general enquiries, press, or partnerships:</p>
    <a class="email" href="mailto:hello@sillageapp.com">hello@sillageapp.com</a>
  </main>
</body>
</html>
